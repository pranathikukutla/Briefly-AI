# =============================================
# Server Configuration
# =============================================
server.port=8090


# =============================================
# MongoDB Configuration
# =============================================
spring.data.mongodb.uri=mongodb://localhost:27017/filesummarizer
spring.data.mongodb.database=filesummarizer


# =============================================
# File Upload Configuration
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB


# =============================================
# Custom File Storage Directory
# =============================================
app.upload.dir=uploads


# =============================================
# Ollama AI Configuration
# =============================================
app.ollama.base-url=http://localhost:11434
app.ollama.text-model=llama3
app.ollama.image-model=llava


# =============================================
# Logging
# =============================================
logging.level.com.filesummarizer=DEBUG

